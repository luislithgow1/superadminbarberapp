<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - BarberApp Super Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1e293b,#0f172a);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:#fff;border-radius:28px;padding:40px;max-width:400px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
        .icon{font-size:80px;margin-bottom:20px}
        h1{color:#1e293b;margin-bottom:10px}
        p{color:#64748b;margin-bottom:20px;line-height:1.5}
        button{background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;border:none;padding:12px 30px;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;transition:transform 0.2s}
        button:hover{transform:scale(1.02)}
        .retry-btn{margin-top:10px}
        .info-text{margin-top:20px;font-size:12px;color:#94a3b8}
        .logo{font-size:28px;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,#1e293b,#0f172a);-webkit-background-clip:text;background-clip:text;color:transparent}
    </style>
</head>
<body>
<div class="container">
    <div class="logo">👑 BarberApp Super Admin</div>
    <div class="icon">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>Parece que no tienes conexión a internet. Algunas funciones pueden estar limitadas hasta que recuperes la conexión.</p>
    <button onclick="window.location.reload()">Reintentar</button>
    <p class="info-text">Los datos se sincronizarán automáticamente cuando recuperes la conexión.</p>
</div>
</body>
</html>
